<!doctype html>
<!-- This line declares the type of this document. It's like saying, "Hey browser, expect proper HTML5 coming your way!" -->

<html lang="en">
<!-- This starts our HTML page and tells the browser the language is English. 
     Think of it as hanging a sign: "Welcome, English readers!" -->

  <head>
  <!-- This is the head of the page – not visible on screen, but it sets the brainy stuff: titles, icons, and mobile behavior. -->

    <meta charset="UTF-8" />
    <!-- Tells the browser what kind of characters we're using. 
         It's like teaching your computer how to read English, Chinese, emojis – all in one! -->

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Adds that small icon you see on your browser tab (called a favicon). 
         It's like your app's face or logo – helps you recognize it in a crowd of tabs. -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Makes sure the website looks good on both phones and big screens.
         Think of it as telling your webpage: “Don’t act big on a small screen.” -->

    <title>Vite + React</title>
    <!-- This is what appears in the browser tab.
         It's the page’s name, like writing your name on the notebook cover. -->
  </head>

  <body>
  <!-- Here begins the visible part of your web page. The body holds everything you want to show on the screen. -->

    <div id="root"></div>
    <!-- This empty box is a placeholder.
         React will come here and say: “Alright, I’ll handle everything inside this box.” 
         It’s like laying out an empty stage and telling the actors: “This is your space.” -->

    <script type="module" src="/src/main.jsx"></script>
    <!-- This script kicks off your React app.
         It's like hitting the ignition on your engine. The car (your app) starts moving from `main.jsx`. -->
  </body>
</html>
